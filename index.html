<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuja's Lesson Collection</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <button id="sidebar-toggle" class="sidebar-toggle"><i class="fas fa-bars"></i></button>
                <h2 class="sidebar-title"><i class="fas fa-book-open"></i> <span>수업 자료실</span></h2>
            </div>
            <ul class="nav-menu" id="subject-menu">
                <!-- JavaScript will populate this -->
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Banner -->
            <div class="top-banner">
                <div class="banner-content">
                    <h1>왕관유자쌤의 수업 자료실</h1>
                    <p>바이브 코딩으로 쉽게 만드는 수업 자료</p>
                </div>
            </div>

            <!-- Post List View -->
            <div id="post-list-view">
                <div class="content-header">
                    <h2 id="current-subject-title">전체</h2>
                    <div class="grade-tabs" id="grade-tabs">
                        <!-- JavaScript will populate this -->
                    </div>
                </div>
                <div class="post-list" id="post-list">
                    <!-- Posts will be generated here -->
                </div>
            </div>

            <!-- Single Post View -->
            <div id="post-detail-view" style="display: none;">
                <div class="detail-header">
                    <button id="back-to-list" class="back-btn"><i class="fas fa-arrow-left"></i> 목록으로</button>
                    <h2 id="detail-title">게시글 제목</h2>
                    <div class="detail-meta" id="detail-meta">학년 · 과목 · 작성자</div>
                </div>
                <div class="detail-body">
                    <div id="detail-text" class="detail-text">본문 내용이 여기에 들어갑니다.</div>
                    
                    <!-- Media Area (Conditional) -->
                    <div id="media-container" class="media-container">
                        <!-- Slideshow, Video, or Image will be injected here -->
                        
                        <!-- Audio Player Container -->
                        <div id="floating-audio-player" class="floating-audio" style="display: none;">
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>



    <script src="app.js"></script>
</body>

</html>
